name: Release

# Tag-driven publish. Maintainers run `pnpm nx release` locally to
# version + tag, then `pnpm release:push-tags` to push them sequentially;
# this workflow picks up each per-package tag push and publishes the
# corresponding npm package via Trusted Publishing (OIDC).
#
# Recovery: if a tag-push event is dropped by GitHub's webhook layer,
# fire workflow_dispatch with the tag name to replay the publish.
# The dispatch path checks out the exact tag, never main, so the
# published artifact always matches the version on the tag.
#
# Tag format: @adaptiveworx/<unscoped>@<version>  (e.g. iac-aws@0.2.0).
on:
  push:
    tags:
      # GitHub's tag glob doesn't reliably match patterns with two `*`
      # separated by a literal `@`, so each package gets an explicit
      # entry. New packages must be added here.
      - '@adaptiveworx/iac-aws@*'
      - '@adaptiveworx/iac-azure@*'
      - '@adaptiveworx/iac-core@*'
      - '@adaptiveworx/iac-policies@*'
      - '@adaptiveworx/iac-schemas@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, e.g. @adaptiveworx/iac-aws@0.2.0'
        required: true
        type: string

permissions:
  contents: read
  id-token: write       # npm Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    # The job's OIDC token includes `environment: production` as a
    # claim. Each package's npm Trusted Publisher rule pins to
    # repo=AdaptiveWorX/iac-core, workflow=release.yml,
    # environment=production — the claims must match for the publish
    # to succeed.
    environment: production

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Allowlist of valid tag patterns. New packages must be added.
          case "$TAG" in
            @adaptiveworx/iac-aws@*|@adaptiveworx/iac-azure@*|@adaptiveworx/iac-core@*|@adaptiveworx/iac-policies@*|@adaptiveworx/iac-schemas@*)
              ;;
            *)
              echo "error: invalid release tag: $TAG" >&2
              exit 1
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Always check out the exact tag, never main. For push.tags
          # this matches GITHUB_REF; for workflow_dispatch this prevents
          # publishing wrong contents under a real version number if
          # main has moved past the tag.
          ref: ${{ steps.release.outputs.tag }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          # Intentionally NOT setting `registry-url:` — it makes
          # setup-node generate an .npmrc with `always-auth=true` and
          # a `${NODE_AUTH_TOKEN}` placeholder, which forces npm into
          # token-auth mode and blocks the OIDC fallback. Each package
          # declares publishConfig.registry directly.

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: pnpm nx run-many -t lint typecheck test build

      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          # Tag format: @adaptiveworx/<name>@<version>
          # Strip trailing @<version> to get the scoped project name.
          PROJECT_NAME="${TAG%@*}"
          UNSCOPED="${PROJECT_NAME#@adaptiveworx/}"
          PKG_DIR="packages/${UNSCOPED}"

          echo "Publishing ${PROJECT_NAME} from ${PKG_DIR}"
          cd "${PKG_DIR}"

          # Use `pnpm pack` to produce a tarball with `workspace:` protocol
          # rewritten to concrete semver ranges, then upload via `npm
          # publish <tarball>` so OIDC Trusted Publishing works exactly as
          # before. `pnpm publish` is deliberately NOT used here — its CLI
          # wrapper has historically interfered with the OIDC ID-token
          # plumbing in this workflow.
          rm -f *.tgz
          pnpm pack
          TARBALL=$(ls -1 *.tgz | head -n1)
          if [ -z "$TARBALL" ]; then
            echo "error: pnpm pack produced no tarball" >&2
            exit 1
          fi
          npm publish "$TARBALL" --provenance --access public

      - name: Job summary
        if: always()
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          echo "### Release: \`${TAG:-<unresolved>}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Conclusion:** \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY
